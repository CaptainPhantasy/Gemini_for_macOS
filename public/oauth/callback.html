<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Gemini – Google Sign-In</title>
<style>
  body { font-family: system-ui, sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; background: #131314; color: #e8eaed; }
  .card { text-align: center; padding: 2rem; }
  .spinner { width: 24px; height: 24px; border: 3px solid #444; border-top-color: #8ab4f8; border-radius: 50%; animation: spin 0.6s linear infinite; margin: 1rem auto; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .ok { color: #81c995; }
  .err { color: #f28b82; }
</style>
</head>
<body>
<div class="card">
  <div class="spinner" id="spinner"></div>
  <p id="status">Completing sign-in…</p>
</div>
<script>
(function () {
  var params = new URLSearchParams(window.location.search);
  var code = params.get('code');
  var state = params.get('state');
  var error = params.get('error');
  var el = document.getElementById('status');
  var sp = document.getElementById('spinner');

  if (error) {
    sp.style.display = 'none';
    el.className = 'err';
    el.textContent = 'Sign-in failed: ' + error;
    return;
  }

  if (!code) {
    sp.style.display = 'none';
    el.className = 'err';
    el.textContent = 'No authorization code received.';
    return;
  }

  try {
    var bc = new BroadcastChannel('gemini-oauth');
    bc.postMessage({ type: 'oauth-callback', code: code, state: state || '' });
    bc.close();
    sp.style.display = 'none';
    el.className = 'ok';
    el.textContent = 'Signed in! This window will close shortly.';
    setTimeout(function () { window.close(); }, 1500);
  } catch (e) {
    sp.style.display = 'none';
    el.className = 'err';
    el.textContent = 'Failed to relay auth code: ' + e.message;
  }
})();
</script>
</body>
</html>
